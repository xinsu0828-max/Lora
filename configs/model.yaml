# ============================================================
# 模型配置
# 作用: 统一管理"用哪个基座模型、最大序列长度"等, 被 tokenizer /
#       训练 / 推理 等多个阶段复用。
# ============================================================

# 基座模型 (HuggingFace Hub 上的仓库 id)
model_id: Qwen/Qwen3-1.7B

# 单条样本最大 token 长度。超过会被截断。
# 自我认知数据很短, 512 足够; 长文本任务可调大(占显存也更多)。
max_seq_length: 512

# Qwen3 思考模式: 自我认知任务不需要推理过程, 关闭保持回答干净。
enable_thinking: false
